`<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Asistencia</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "Segoe UI", Tahoma, sans-serif;
    background: #fafafa;
    color: #2c2c2c;
    padding: 24px;
    min-height: 100vh;
    line-height: 1.4;
  }

  .container { max-width: 1100px; margin: 0 auto; }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-bottom: 16px;
    margin-bottom: 24px;
    border-bottom: 2px solid #1d4e8e;
  }
  header img { height: 56px; width: auto; }
  header .titulo h1 {
    font-size: 19px;
    font-weight: 600;
    color: #1d4e8e;
    margin: 0;
  }
  header .titulo p {
    font-size: 13px;
    color: #6b6b6b;
    margin-top: 2px;
  }

  .estado {
    margin-left: auto;
    font-size: 12px;
    color: #6b6b6b;
    text-align: right;
  }
  .estado .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #bbb;
    margin-right: 5px;
    vertical-align: middle;
  }
  .estado .dot.ok { background: #2e7d32; }
  .estado .dot.fail { background: #c62828; }

  .grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 20px;
  }
  @media (max-width: 800px) {
    .grid { grid-template-columns: 1fr; }
    header img { height: 44px; }
  }

  .panel {
    background: white;
    border: 1px solid #e2e2e2;
    border-radius: 4px;
    overflow: hidden;
  }
  .panel header {
    background: #f4f4f4;
    border-bottom: 1px solid #e2e2e2;
    border-top: none;
    padding: 10px 14px;
    margin: 0;
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .panel header .reload {
    float: right;
    background: none;
    border: 1px solid #ccc;
    padding: 1px 8px;
    border-radius: 3px;
    color: #666;
    cursor: pointer;
    font-size: 12px;
  }
  .panel header .reload:hover { background: white; }
  .panel .body { padding: 0; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td {
    text-align: left;
    padding: 9px 14px;
    border-bottom: 1px solid #f0f0f0;
  }
  th {
    color: #666;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    background: #fafafa;
  }
  td { color: #333; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbfc; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .badge.entrada { background: #e8f5e9; color: #1b5e20; }
  .badge.salida  { background: #fff3e0; color: #e65100; }

  code {
    font-family: "Menlo", Consolas, monospace;
    font-size: 12px;
    color: #555;
    background: #f4f4f4;
    padding: 1px 5px;
    border-radius: 3px;
  }

  .vacio {
    text-align: center;
    color: #999;
    padding: 28px 14px;
    font-size: 13px;
    font-style: italic;
  }

  .lista-usuarios { padding: 6px 0; }
  .usuario-item {
    padding: 9px 14px;
    border-bottom: 1px solid #f0f0f0;
    font-size: 13px;
  }
  .usuario-item:last-child { border-bottom: none; }
  .usuario-item .nombre { color: #333; }
  .usuario-item .matricula {
    display: block;
    color: #888;
    font-size: 11px;
    margin-top: 2px;
    font-family: Menlo, Consolas, monospace;
  }

  footer {
    margin-top: 28px;
    padding-top: 14px;
    border-top: 1px solid #e2e2e2;
    text-align: center;
    font-size: 11px;
    color: #999;
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <img src="/web/assets/logo-uv.jpg" alt="Universidad Veracruzana">
    <div class="titulo">
      <h1>Control de Asistencia</h1>
      <p>Sistema de registro por tarjetas NFC</p>
    </div>
    <div class="estado">
      <span class="dot" id="dot"></span>
      <span id="estadoTxt">Conectando...</span>
      <br>
      <span id="reloj"></span>
    </div>
  </header>

  <div class="grid">

    <div class="panel">
      <header>Usuarios registrados</header>
      <div class="body" id="usuarios"></div>
    </div>

    <div class="panel">
      <header>
        Últimos accesos
        <button class="reload" onclick="cargarRegistros()" title="Actualizar">↻</button>
      </header>
      <div class="body" id="registros"></div>
    </div>

  </div>

  <footer>
    Universidad Veracruzana &mdash; Proyecto de Investigación
  </footer>

</div>

<script>
const API = '';

// Reloj de la barra superior
function tick() {
  const ahora = new Date();
  document.getElementById('reloj').textContent = ahora.toLocaleString('es-MX', {
    weekday: 'short', day: '2-digit', month: 'short',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}
setInterval(tick, 1000); tick();

// Convierte el ISO que manda la API a hora local correctamente
function fmtFecha(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleString('es-MX', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}

async function checkAPI() {
  try {
    const r = await fetch(API + '/');
    if (r.ok) {
      document.getElementById('dot').className = 'dot ok';
      document.getElementById('estadoTxt').textContent = 'Servicio activo';
      return true;
    }
  } catch (e) {}
  document.getElementById('dot').className = 'dot fail';
  document.getElementById('estadoTxt').textContent = 'Servicio sin conexión';
  return false;
}

async function cargarRegistros() {
  const div = document.getElementById('registros');
  try {
    const r = await fetch(API + '/registros?limit=20');
    const data = await r.json();

    if (data.length === 0) {
      div.innerHTML = '<div class="vacio">Aún no hay registros.</div>';
      return;
    }

    let html = '<table><thead><tr>'
      + '<th>Fecha y hora</th>'
      + '<th>Tipo</th>'
      + '<th>Usuario</th>'
      + '<th>Matrícula</th>'
      + '<th>UID tarjeta</th>'
      + '</tr></thead><tbody>';

    for (const reg of data) {
      const badge = reg.tipo_evento === 'ENTRADA' ? 'entrada' : 'salida';
      html += `<tr>
        <td>${fmtFecha(reg.fecha_hora)}</td>
        <td><span class="badge ${badge}">${reg.tipo_evento}</span></td>
        <td>${reg.usuario || '-'}</td>
        <td>${reg.matricula || '-'}</td>
        <td><code>${reg.uid || '-'}</code></td>
      </tr>`;
    }
    html += '</tbody></table>';
    div.innerHTML = html;
  } catch (e) {
    div.innerHTML = '<div class="vacio">No se pudo cargar la información.</div>';
  }
}

async function cargarUsuarios() {
  const div = document.getElementById('usuarios');
  try {
    const r = await fetch(API + '/usuarios');
    const data = await r.json();

    if (data.length === 0) {
      div.innerHTML = '<div class="vacio">Sin usuarios registrados.</div>';
      return;
    }

    let html = '<div class="lista-usuarios">';
    for (const u of data) {
      const nombre = `${u.nombre} ${u.apellido_paterno} ${u.apellido_materno || ''}`.trim();
      html += `<div class="usuario-item">
        <span class="nombre">${nombre}</span>
        <span class="matricula">${u.matricula}</span>
      </div>`;
    }
    html += '</div>';
    div.innerHTML = html;
  } catch (e) {
    div.innerHTML = '<div class="vacio">Error al cargar.</div>';
  }
}

(async () => {
  if (await checkAPI()) {
    cargarRegistros();
    cargarUsuarios();
    setInterval(cargarRegistros, 3000);
    setInterval(checkAPI, 10000);
  }
})();
</script>
</body>
</html>
